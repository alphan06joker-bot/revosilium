# REVOSILIUM v3 — Codemagic Build Config
workflows:
  revosilium-android:
    name: REVOSILIUM Android Build
    max_build_duration: 30
    environment:
      flutter: 3.22.3
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Get Flutter packages
        script: |
          cd $FCI_BUILD_DIR
          flutter pub get
      - name: Build APK release
        script: |
          cd $FCI_BUILD_DIR
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/release/*.apk
    publishing:
      email:
        recipients:
          - alphan06joker@gmail.com
